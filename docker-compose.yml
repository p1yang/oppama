services:
  oppama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oppama
    restart: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # 挂载配置文件（移除:ro 以允许写入）
      - ./config.yaml:/app/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - oppama-network

networks:
  oppama-network:
    driver: bridge
