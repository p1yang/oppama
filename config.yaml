server:
    host: 0.0.0.0
    port: 8080
    mode: release
proxy:
    enabled: true
    enable_auth: true
    api_key: admin123
    default_model: ""
    fallback_enabled: true
    max_retries: 3
    timeout: 120
    rate_limit:
        enabled: false
        requests_per_minute: 60
    http_proxy: ""
    https_proxy: ""
    no_proxy: ""
auth:
    enabled: true
    jwt_secret: change-this-secret-in-production
    jwt_expire: 24h
    enable_blacklist: true
    blacklist_ttl: 24h
    password_policy:
        min_length: 8
        require_upper: true
        require_lower: true
        require_numbers: true
        require_special: false
    login_rate_limit:
        max_attempts: 20
        window_minutes: 5
        lockout_minutes: 30
    session_timeout: 168h
cors:
    allowed_origins:
        - http://localhost:5173
        - http://localhost:8080
    allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    allowed_headers:
        - Origin
        - Content-Type
        - Authorization
    allow_credentials: false
    max_age: 86400
detector:
    concurrency: 10
    timeout: 30
    check_interval: 3600
    model_sync_interval: 3600
    honeypot_detection:
        enabled: true
        suspicious_ports:
            - 8080
            - 8888
            - 9000
        fake_versions:
            - 0.0.0
            - unknown
        threshold: 10
discovery:
    auto_discovery:
        enabled: false
        interval: 3600
    engines:
        fofa:
            enabled: false
            email: ""
            key: ""
            query: port="11434"
            max_results: 100
        hunter:
            enabled: false
            key: 5837e59cacced34bcfd3d15bc343e7f4a07696cafe11d8e6de04c68341931b23
            query: port="11434"
            max_results: 100
        shodan:
            enabled: false
            key: Su5MSEONomqumcQd4gFmWlk2izdsNafA
            query: http.title:"Ollama"
            max_results: 100
storage:
    type: sqlite
    sqlite:
        path: ./data/oppama.db
    postgres:
        host: ""
        port: 0
        database: ""
        user: ""
        password: ""
    retention_days: 30
    # 数据库连接池配置
    pool:
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: 1800  # 秒，30分钟
        conn_max_idle_time: 300  # 秒，5分钟
log:
    level: debug
    format: json
    output: ./logs/server.log
    max_size: 100
    max_backups: 5
    max_age: 30
